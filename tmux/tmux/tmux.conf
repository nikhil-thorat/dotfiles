set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "tmux-plugins/tmux-battery"

set-option -g default-shell /bin/zsh

set-option -sa terminal-overrides ",xterm*:Tc"

unbind C-b
set -g prefix C-space
bind C-space send-prefix

bind v split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind q confirm-before -p "kill-pane #P? (y/n)" kill-pane

bind t new-window
bind r command-prompt -I "#W" "rename-window '%%'"
bind W choose-window
bind w confirm-before -p "kill-window #W? (y/n)" kill-window

bind C-l send-keys 'C-l'

set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-window-option -g mode-keys vi

set -g status-position bottom
set -g status-interval 1

set -g status-style "bg=default,fg=brightblack"

set -g status-left "#[fg=black,bold,bg=blue] #{host} #[fg=blue,bg=black]▓▒░"
set -g status-left-length 50

set -g status-right "#(~/.config/tmux/battery.sh)"
set -g status-right-length 50

set -g window-status-format "#[fg=brightblack] #W"
set -g window-status-current-format "#[fg=brightgreen,bold] #W"

set -g pane-border-style "fg=black,bold,bg=default"
set -g pane-active-border-style "fg=black,bold,bg=default"

run "~/.tmux/plugins/tpm/tpm"
